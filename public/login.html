<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand text-center">
        <h2>LOGIN</h2>
        <p>Login Admin</p>
      </div>

      <h3 class="login-title">LOGIN</h3>
      <p class="login-subtitle">Silakan login untuk mengajses dashboard.</p>

      <div id="loginAlert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" placeholder="admin" required />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="admin123" required />
        </div>

        <button type="submit" class="btn btn-login w-100">Login</button>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
