<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Input Mahasiswa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-body">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h3>nata</h3>
        <p>Admin Panel</p>
      </div>

      <div class="sidebar-user">
        <div class="avatar">A</div>
        <div>
          <h6 class="mb-0 admin-name">Admin</h6>
          <small>Administrator</small>
        </div>
      </div>

      <ul class="sidebar-menu">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="form.html" class="active">Tambah Mahasiswa</a></li>
        <li><a href="table.html">Tabel Data</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h4 class="mb-0">Form Input Mahasiswa</h4>
      </div>

      <div class="dashboard-card">
        <div id="alertBox"></div>

        <form id="formMahasiswa">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nim" class="form-label">NIM</label>
              <input type="text" class="form-control" id="nim" name="nim" required />
            </div>

            <div class="col-md-6">
              <label for="nama" class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" id="nama" name="nama" required />
            </div>

            <div class="col-md-6">
              <label for="fakultas" class="form-label">Fakultas</label>
              <select class="form-select" id="fakultas" name="fakultas" required>
                <option value="">-- Pilih Fakultas --</option>
                <option value="Fakultas Teknik Elektro">Fakultas Teknik Elektro</option>
                <option value="Fakultas Rekayasa Industri">Fakultas Rekayasa Industri</option>
                <option value="Fakultas Informatika">Fakultas Informatika</option>
                <option value="Fakultas Ekonomi dan Bisnis">Fakultas Ekonomi dan Bisnis</option>
                <option value="Fakultas Industri Kreatif">Fakultas Industri Kreatif</option>
                <option value="Fakultas Ilmu Terapan">Fakultas Ilmu Terapan</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="jurusan" class="form-label">Jurusan / Prodi</label>
              <select class="form-select" id="jurusan" name="jurusan" required>
                <option value="">-- Pilih Jurusan --</option>
                <option value="S1 Teknik Telekomunikasi">S1 Teknik Telekomunikasi</option>
                <option value="S1 Teknik Elektro">S1 Teknik Elektro</option>
                <option value="S1 Teknik Biomedis">S1 Teknik Biomedis</option>
                <option value="S1 Teknologi Pangan">S1 Teknologi Pangan</option>
                <option value="S1 Teknik Industri">S1 Teknik Industri</option>
                <option value="S1 Sistem Informasi">S1 Sistem Informasi</option>
                <option value="S1 Digital Supply Chain">S1 Digital Supply Chain</option>
                <option value="S1 Informatika">S1 Informatika</option>
                <option value="S1 Rekayasa Perangkat Lunak">S1 Rekayasa Perangkat Lunak</option>
                <option value="S1 Data Sains">S1 Data Sains</option>
                <option value="S1 Digital Business">S1 Digital Business</option>
                <option value="S1 Desain Komunikasi Visual">S1 Desain Komunikasi Visual</option>
                <option value="S1 Desain Produk">S1 Desain Produk</option>
                <option value="D3 Teknik Telekomunikasi">D3 Teknik Telekomunikasi</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="angkatan" class="form-label">Angkatan</label>
              <input type="number" class="form-control" id="angkatan" name="angkatan" min="2000" max="2100" required />
            </div>

            <div class="col-md-6">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" required />
            </div>
          </div>

          <div class="mt-4 d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-login">Simpan Data</button>
            <button type="reset" class="btn btn-light-custom">Reset</button>
            <a href="table.html" class="btn btn-outline-custom">Lihat Tabel</a>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
