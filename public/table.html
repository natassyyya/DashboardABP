<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabel Data Mahasiswa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-body">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h3>nata</h3>
        <p>Admin Panel</p>
      </div>

      <div class="sidebar-user">
        <div class="avatar">A</div>
        <div>
          <h6 class="mb-0 admin-name">Admin</h6>
          <small>Administrator</small>
        </div>
      </div>

      <ul class="sidebar-menu">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="form.html">Tambah Mahasiswa</a></li>
        <li><a href="table.html" class="active">Tabel Data</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h4 class="mb-0">Tabel Data Mahasiswa</h4>
      </div>

      <div class="dashboard-card">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <div>
            <h5 class="mb-1">Data Mahasiswa</h5>
            <p class="text-muted mb-0">Tampil dengan JSON dan jQuery DataTables.</p>
          </div>
          <a href="form.html" class="btn btn-login">+ Tambah Data</a>
        </div>

        <div id="tableAlert"></div>

        <div class="table-responsive">
          <table id="mahasiswaTable" class="table table-hover align-middle w-100">
            <thead>
              <tr>
                <th>No</th>
                <th>NIM</th>
                <th>Nama</th>
                <th>Fakultas</th>
                <th>Jurusan</th>
                <th>Angkatan</th>
                <th>Email</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="js/table.js"></script>
</body>
</html>
